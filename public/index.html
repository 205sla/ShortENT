  <div class="mainC container">
    <div class="loading-container HoldMiddle" style="display: none;">
      <div class="status-card">
        <div id="loadURL" class="text-center">
          <div class="spinner-grow" role="status">
          </div>
          <p class="mt-3">로딩 중...</p>
        </div>

        <div id="moveURL" class="text-center" style="display: none;">
          <i class="bi bi-check-circle-fill status-icon status-icon-success"></i>
          <p class="mt-3">이동 중...</p>
          <p class="mt-3"><button type="button" class="btn btn-entry-outline GoMainPage">단축 URL 생성하기</button></p>
        </div>

        <div id="errorURL" class="text-center" style="display: none;">
          <i class="bi bi-exclamation-circle-fill status-icon status-icon-error"></i>
          <p class="mt-3">잘못된 주소입니다.</p>
          <p class="mt-3"><button type="button" class="btn btn-entry-outline GoMainPage">단축 URL 생성하기</button></p>
        </div>

        <div id="errorShow" class="text-center" style="display: none;">
          <i class="bi bi-exclamation-circle-fill status-icon status-icon-error"></i>
          <p class="mt-3" id="errorTXT">오류</p>
          <p class="mt-3"><button type="button" class="btn btn-entry-outline GoMainPage">단축 URL 생성하기</button></p>
        </div>

        <div id="strangerURL" class="text-center" style="display: none;">
          <i class="bi bi-question-circle-fill status-icon status-icon-warning"></i>
          <p class="mt-3">잘못된 주소입니다.</p>
          <p class="mt-3">클릭하면 큰 문제가 발생할 가능성이 있습니다.</p>
          <p class="mt-3" id="stranger">이동하기</p>
          <p class="mt-3"><button type="button" class="btn btn-entry-outline GoMainPage">단축 URL 생성하기</button></p>
        </div>

        <div id="successURL" class="text-center" style="display: none;">
          <i class="bi bi-check-circle-fill status-icon status-icon-success"></i>
          <p class="mt-3">짧은 URL 생성 완료!</p>
          <p class="mt-3"><button type="button" class="btn btn-entry-outline copyURL">복사하기</button></p>
        </div>
      </div>
    </div>

    <div class="mainPage" style="display: none;">
      <div class="mainTitle text-center mb-4">
        <h1 class="main-heading">짧은 엔트리</h1>
        <p class="main-subtitle">엔트리 전용 단축 URL 생성 서비스 — 작품, 마이페이지, 월드</p>
      </div>

      <div class="input-container card-container p-4 p-md-5">
        <form>
          <fieldset class="row mb-3">
            <legend class="col-form-label col-sm-2 pt-0">분류</legend>
            <div class="col-sm-10">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="option1" checked>
                <label class="form-check-label" for="gridRadios1">
                  엔트리 작품
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="option2">
                <label class="form-check-label" for="gridRadios2">
                  마이페이지
                </label>
              </div>
              <div class="form-check disabled">
                <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios3" value="option3">
                <label class="form-check-label" for="gridRadios3">
                  탐험하기
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios4" value="option4">
                <label class="form-check-label" for="gridRadios4">
                  노하우&팁
                </label>
              </div>
            </div>
          </fieldset>
          <div class="row mb-3">
            <label for="inputURL" class="col-sm-2 col-form-label">주소</label>
            <div class="col-sm-10">
              <input type="url" class="form-control" id="inputURL" placeholder="https://playentry.org/project/...">
            </div>
          </div>
          <div class="row mb-3">
            <label for="inputNickname" class="col-sm-2 col-form-label">별명</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="inputNickname" placeholder="minigame">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-sm-10 offset-sm-2">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gridCheck1">
                <label class="form-check-label" for="gridCheck1">
                  나는 로봇 입니다.
                </label>
              </div>
            </div>
          </div>
          <button type="button" id="CreateShortcutURL" class="btn btn-entry">생성하기</button>
        </form>
